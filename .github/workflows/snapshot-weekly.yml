name: snapshot-weekly
on:
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC (adjust as desired)
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest_file: ${{ steps.commit.outputs.digest_file }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need HEAD:data/studies.json for the digest baseline
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Snapshot + digest + build
        run: python -m osdr_explorer all
      - name: Commit changes and capture any new digest
        id: commit
        run: |
          TODAY="$(date -u +%F)"
          DIGEST="digest/${TODAY}.md"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site digest
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: weekly OSDR snapshot ${TODAY}"
            git push
          fi
          if [ -f "$DIGEST" ]; then
            echo "digest_file=$DIGEST" >> "$GITHUB_OUTPUT"
          fi
      - name: Open issue for new/updated studies
        if: steps.commit.outputs.digest_file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "New & updated OSDR studies — week of $(date -u +%F)" \
            --body-file "${{ steps.commit.outputs.digest_file }}"
  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
